    const rendererMod = await loadDocxRendererForTests()
  - |
    const rendererMod = await loadDocxRendererForTests()
    interface RendererMod {
      layoutDocument: (doc: unknown) => unknown
    }
  - |
    const rendererMod = await loadDocxRendererForTests()
    type RendererMod = {
      renderDocumentToCanvas: (...args: unknown[]) => Promise<void>
