id: no-deleted-docx-pagination-api-in-node-probes
valid:
  - |
    const layout = layoutDocument(doc)
    const totalPages = layout.pages.length
    renderDocumentToCanvas(doc, canvas, 0, { layoutServices })
  - |
    type RendererModule = {
      layoutDocument: (doc: unknown) => { pages: readonly unknown[] }
    }
invalid:
  - paginateDocument(doc)
  - renderer.paginateDocument(doc)
  - const { paginateDocument } = renderer
  - |
    type RendererModule = {
      paginateDocument: (doc: unknown) => unknown[][]
    }
  - |
    renderDocumentToCanvas(doc, canvas, 0, { prebuiltPages: pages })
