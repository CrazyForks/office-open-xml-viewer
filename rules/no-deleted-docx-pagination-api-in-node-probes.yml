id: no-deleted-docx-pagination-api-in-node-probes
language: TypeScript
severity: error
files:
  - packages/node/src/docx*.test.ts
rule:
  any:
    - kind: identifier
      regex: '^(paginateDocument|prebuiltPages)$'
    - kind: property_identifier
      regex: '^(paginateDocument|prebuiltPages)$'
    - kind: shorthand_property_identifier_pattern
      regex: '^(paginateDocument|prebuiltPages)$'
message: Node DOCX probes must use the retained layoutDocument contract.
note: |
  A6 removed the fragment-array pagination adapter. Hand-written dynamic-import
  module types can otherwise keep deleted identifiers type-checking until a
  private or environment-gated probe eventually executes. Select pages from
  layoutDocument(...).pages and render through layoutServices/currentDate.
