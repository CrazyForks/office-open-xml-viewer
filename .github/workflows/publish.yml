name: Publish to npm

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  id-token: write  # required for npm provenance attestation

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      # ── Rust toolchain ──────────────────────────────────────────────────────
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            packages/pptx/parser
            packages/xlsx/parser
            packages/docx/parser

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      # ── Node / pnpm ─────────────────────────────────────────────────────────
      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        # version is read from packageManager field in package.json

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # ── Build ────────────────────────────────────────────────────────────────
      - name: Build WASM (all packages)
        run: pnpm build:wasm

      # Gate the release on a clean typecheck so a tag never publishes
      # type-broken code (defence in depth alongside the PR CI workflow).
      - name: Typecheck
        run: pnpm typecheck

      # A tag must never publish code whose unit tests are red. WASM was built
      # above, so the renderer/parser probe suites have their .wasm available.
      - name: Unit tests
        run: pnpm test

      - name: Build library
        run: pnpm build

      # PD13 — fail the release if a WASM parser was re-inlined into a JS bundle
      # as a base64 data-URL (which once bloated the package ~6 MB). The parsers
      # must ship as real .wasm assets referenced by URL; this gate scans the
      # freshly built dist/ for the base64 WASM magic before we pack.
      - name: Guard against base64-inlined WASM
        run: pnpm check:no-inline-wasm

      # ── Verify the package that is about to be published ──────────────────────
      # publint checks packaging correctness (exports ordering, file presence,
      # module/type field sanity). attw checks that every entrypoint resolves to
      # type declarations under each module-resolution mode. Both run against the
      # real `npm pack` tarball, so a broken `exports` map fails the release
      # instead of shipping. `--profile esm-only` acknowledges this package is
      # intentionally ESM-only: it ignores the node10 and node16-from-CJS
      # resolutions (which cannot succeed without a legacy CJS build we do not
      # ship) while still failing on any regression in the ESM / bundler columns.
      - name: Verify package exports (publint + attw)
        run: |
          npx --yes publint
          npx --yes @arethetypeswrong/cli --pack . --profile esm-only

      # Smoke test the actual tarball a consumer would install: pack it, install
      # it into a throwaway project, and import each subpath in a DOM-less Node
      # process. This proves the published entrypoints resolve AND that importing
      # them has no top-level side effect (a stray `document` touch would throw
      # `ReferenceError` here), which is the contract behind `sideEffects: false`.
      - name: Smoke test the packed tarball
        run: |
          npm pack
          mkdir -p /tmp/pack-smoke && cd /tmp/pack-smoke
          npm init -y
          npm i "$GITHUB_WORKSPACE"/silurus-ooxml-*.tgz
          node --input-type=module -e "const m = await import('@silurus/ooxml/docx'); if (!m.DocxViewer) throw new Error('DocxViewer missing'); const p = await import('@silurus/ooxml/pptx'); if (!p.PptxViewer) throw new Error('PptxViewer missing'); const x = await import('@silurus/ooxml/xlsx'); if (!x.XlsxViewer) throw new Error('XlsxViewer missing'); console.log('pack smoke OK');"

      # ── Build the standalone install set ─────────────────────────────────────
      # `pnpm build` above only builds the root bundle. The parser packages ship
      # their own `dist/` (their `.` entry) plus the wasm glue under `src/`, and
      # `@silurus/ooxml-markdown` compiles its `src/index.ts` to `dist/index.js`
      # (Node refuses to strip types from `.ts` under node_modules, so the
      # standalone package must expose compiled JS). Build them all before
      # publishing. `@silurus/ooxml-core` is bundled into each parser's dist at
      # build time (it is a devDependency, not shipped), so it is built
      # transitively here via the parsers' `tsc --build` project references.
      - name: Build parser + markdown packages for standalone publish
        run: >-
          pnpm
          --filter @silurus/ooxml-docx
          --filter @silurus/ooxml-xlsx
          --filter @silurus/ooxml-pptx
          --filter @silurus/ooxml-markdown
          build

      # ── Publish ──────────────────────────────────────────────────────────────
      # Publish the root bundle plus the standalone install set: the three parser
      # packages (now public) and the markdown converter, which depends on them.
      # `@silurus/ooxml-core` and `@silurus/ooxml-node` stay private and are skipped
      # by pnpm; the unscoped VS Code extension package is excluded by the filters.
      # pnpm publishes in dependency order and skips versions already on the
      # registry, so re-running a tag is safe.
      - name: Publish to npm
        run: >-
          pnpm publish --recursive --no-git-checks
          --filter @silurus/ooxml
          --filter @silurus/ooxml-docx
          --filter @silurus/ooxml-xlsx
          --filter @silurus/ooxml-pptx
          --filter @silurus/ooxml-markdown
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          # access / provenance are set via publishConfig in package.json
